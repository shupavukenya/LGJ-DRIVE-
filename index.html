<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shupavu Ride</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom Premium Bolt-inspired Colors */
        .bg-bolt-green { background-color: #00CD69; }
        .text-bolt-green { color: #00CD69; }
        .border-bolt-green { border-color: #00CD69; }
        
        .app-screen { display: none; }
        .app-screen.active { display: flex; }

        /* Realistic Vector Map Concept */
        .realistic-map {
            background-color: #f4f6f8;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        /* Custom Styled Simulated Vector Roads */
        .road-primary {
            position: absolute;
            background: #ffffff;
            height: 28px;
            width: 150%;
            top: 45%;
            left: -25%;
            transform: rotate(-12deg);
            border-top: 2px solid #e2e8f0;
            border-bottom: 2px solid #e2e8f0;
        }
        .road-secondary {
            position: absolute;
            background: #ffffff;
            width: 24px;
            height: 150%;
            left: 40%;
            top: -25%;
            transform: rotate(25deg);
            border-left: 2px solid #e2e8f0;
            border-right: 2px solid #e2e8f0;
        }
    </style>
</head>
